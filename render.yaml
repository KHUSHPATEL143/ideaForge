services:
  - type: web
    name: crmideaforge
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://crmideaforge.onrender.com
      - key: CORS_ORIGIN
        value: https://crmideaforge.onrender.com
      - key: DNS_SERVERS
        value: 1.1.1.1,8.8.8.8
      - key: VITE_PUBLIC_APP_URL
        value: https://crmideaforge.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://crmideaforge.onrender.com/api/auth/google/callback
